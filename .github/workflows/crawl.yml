name: Daily Crawl & Deploy
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：赋予 Actions 写仓库的权限
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5  # 升级到支持 Node.js 24 的版本

      - name: 设置 Python 环境
        uses: actions/setup-python@v6  # 升级到支持 Node.js 24 的版本
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行爬虫脚本
        run: python crawler.py

      - name: 提交更新到仓库
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add index.html
          git commit -m "更新每日链接 $(date +'%Y-%m-%d')" || echo "无新链接，无需提交"
          git push
